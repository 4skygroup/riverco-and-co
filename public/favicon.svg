<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond blanc de l'image -->
  <rect width="512" height="512" fill="#ffffff"/>
  
  <!-- Groupe incliné pour la bande et le texte -->
  <g transform="translate(256, 256) rotate(-28) translate(-256, -256)">
    
    <!-- Bande noire diagonale -->
    <rect x="-150" y="196" width="812" height="120" fill="#000000"/>
    
    <!-- Texte centré dans la bande -->
    <text 
      x="256" 
      y="278" 
      font-family="system-ui, -apple-system, sans-serif" 
      font-size="52" 
      font-weight="900" 
      letter-spacing="5"
      fill="#ffffff" 
      text-anchor="middle"
    >
      RIVERCO &amp; CO
    </text>
    
  </g>
</svg>
